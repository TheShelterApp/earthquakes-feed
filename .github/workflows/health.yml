name: health

# Hourly watchdog. Checks the LIVE Pages manifest (the only check that catches every
# stale mode: dead cron, failed derive, failed deploy) and per-provider degradation.
# On failure: opens/refreshes a pinned issue and fails the run (visible red).
on:
  schedule:
    - cron: '25 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check live feed freshness + providers
        id: check
        run: |
          set -e
          # Fetch to files, not shell vars: the manifest is >128 KB and passing it as an
          # argv element trips MAX_ARG_STRLEN → `exec: Argument list too long` (E2BIG).
          curl -sf --max-time 20 "https://earthquakes-feed.theshelter.app/v1/manifest.json" -o manifest.json \
            || { echo "problem=manifest unreachable" >> "$GITHUB_OUTPUT"; exit 0; }
          curl -sf --max-time 20 "https://earthquakes-feed.theshelter.app/v1/status.json" -o status.json || true
          node -e '
            const fs = require("fs");
            const m = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
            let s = {};
            try { const raw = fs.readFileSync("status.json", "utf8"); if (raw.trim()) s = JSON.parse(raw); } catch {}
            const ageS = (Date.now() - m.generated) / 1000;
            const staleAfter = (m.freshness && m.freshness.stale_after_seconds) || 1800;
            const degraded = s.degraded || [];
            const total = Object.keys(s.providers || {}).length || 1;
            // Scale with the roster: a handful of slow national FDSN nodes flap constantly and
            // the feed stays fully covered by the global catalogs — only a systemic share down
            // (~30%, floor 8) signals a real problem. Manifest staleness is the primary signal.
            const degLimit = Math.max(8, Math.ceil(total * 0.3));
            console.log(`age=${Math.round(ageS)}s (stale_after=${staleAfter}) head_seq=${m.head_seq} events=${m.event_count} degraded=${degraded.length}/${total} limit=${degLimit} [${degraded.join(",")}]`);
            const problems = [];
            if (ageS > staleAfter) problems.push(`live manifest is ${Math.round(ageS / 60)} min stale (contract: ${staleAfter / 60} min)`);
            if (degraded.length >= degLimit) problems.push(`${degraded.length}/${total} providers degraded: ${degraded.join(", ")}`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `problem=${problems.join("; ")}\n`);
          '
      - name: Open/refresh health issue and fail
        if: steps.check.outputs.problem != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PROBLEM: ${{ steps.check.outputs.problem }}
        run: |
          TITLE="[health] feed unhealthy"
          BODY="Automated watchdog: ${PROBLEM}

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} ($(date -u +%FT%TZ))"
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY" --label bug
          fi
          echo "::error::$PROBLEM"
          exit 1
      - name: Close health issue on recovery
        if: steps.check.outputs.problem == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NUM=$(gh issue list --repo "${{ github.repository }}" --state open --search "[health] feed unhealthy in:title" --json number --jq '.[0].number // empty')
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "${{ github.repository }}" --body "Recovered — live feed healthy again as of $(date -u +%FT%TZ) (run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            gh issue close "$NUM" --repo "${{ github.repository }}"
          fi
