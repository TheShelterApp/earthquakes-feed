name: derive

# Phase 2: rebuild derived views (rolling summaries, per-day partitions + Pages day
# files, manifest) as a pure function of the log, then publish.
# Summaries go to Cloudflare Pages ONLY (never committed — design §4.5); the data
# branch gets plain-NDJSON partitions + the root manifest. Direct Upload deploys do
# NOT count against the 500-builds/month Pages cap.
on:
  workflow_run:
    workflows: ['aggregate']
    types: [completed]
  schedule:
    - cron: '2 * * * *'
  workflow_dispatch:

concurrency:
  group: earthquakes-feed-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  derive:
    # Never derive on top of a failed/cancelled aggregate (M6).
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          ref: data
          path: .data
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Check CF secrets present
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo '::error::CF_API_TOKEN secret is missing — live feed would go stale silently'
            exit 1
          fi
      - name: Derive views
        env:
          DATA_DIR: .data
          PUBLIC_DIR: public
        run: npx --no-install tsx src/derive.ts
      - name: Validate output (schema + seq + size gates)
        env:
          DATA_DIR: .data
          PUBLIC_DIR: public
        run: npx --no-install tsx src/validate.ts
      - name: Commit & push derived views
        working-directory: .data
        run: |
          git config user.name  "earthquakes-feed-bot"
          git config user.email "bot@users.noreply.github.com"
          git add events manifest.json
          git commit -m "derive: views @ $(date -u +%FT%TZ)" || echo 'no data-branch changes'
          # Fail-loud push loop (H3) — but only if we actually committed.
          if ! git diff --quiet origin/data..HEAD 2>/dev/null; then
            for i in 1 2 3; do
              git push origin HEAD:data && break
              git fetch origin data
              git rebase origin/data || { git rebase --abort; echo '::error::rebase conflict pushing to data'; exit 1; }
              [ "$i" = "3" ] && { echo '::error::push to data failed after 3 attempts'; exit 1; }
            done
          fi
      - name: Publish live feed to Cloudflare Pages (Direct Upload)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx --no-install wrangler pages deploy public --project-name=earthquakes-feed --branch=main --commit-dirty=true
