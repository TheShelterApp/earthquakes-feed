name: backfill

# Walks history backward, one paced window per provider per run, into day partitions
# (idempotent via the same dedup path), toward a 3-year target. Cold months are rolled
# to Releases by archive.yml so the tree stays bounded. A dispatch with start/end is a
# one-off fill of that range and does NOT move the auto-cursor.
on:
  schedule:
    - cron: '41 * * * *'
  workflow_dispatch:
    inputs:
      starttime:
        description: 'ISO start (e.g. 2025-01-01T00:00:00Z); one-off, does not move the cursor'
        required: false
      endtime:
        description: 'ISO end'
        required: false
      providers:
        description: 'Comma-separated provider ids (blank = all eligible)'
        required: false
      minmag:
        description: 'Minimum magnitude (blank = provider default)'
        required: false

concurrency:
  group: earthquakes-feed-writer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/checkout@v4
        with:
          ref: data
          path: .data
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Backfill
        env:
          DATA_DIR: .data
          # gh release download: lets backfill pull archived (cold) months back to merge a
          # newly-added source into them (re-materialize + flag month for re-roll).
          GH_TOKEN: ${{ github.token }}
          BACKFILL_STARTTIME: ${{ inputs.starttime }}
          BACKFILL_ENDTIME: ${{ inputs.endtime }}
          BACKFILL_PROVIDERS: ${{ inputs.providers }}
        run: npx --no-install tsx src/backfill.ts
      - name: Validate log delta
        env:
          DATA_DIR: .data
        run: npx --no-install tsx src/validate.ts
      - name: Commit & push
        working-directory: .data
        run: |
          git config user.name  "earthquakes-feed-bot"
          git config user.email "bot@users.noreply.github.com"
          git add events knowledge
          git commit -m "backfill: @ $(date -u +%FT%TZ)" || { echo 'no changes'; exit 0; }
          for i in 1 2 3; do
            git push origin HEAD:data && exit 0
            git fetch origin data
            git rebase origin/data || { git rebase --abort; echo '::error::rebase conflict'; exit 1; }
          done
          echo '::error::push failed after 3 attempts'; exit 1
